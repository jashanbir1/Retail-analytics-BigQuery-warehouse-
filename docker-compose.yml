services:
  postgres:
    image: postgres:15
    container_name: retail_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: retail_airflow_init
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__API__BASE_URL: http://airflow-api-server:8080
      GOOGLE_APPLICATION_CREDENTIALS: /opt/project/credentials/gcp-service-account.json
    volumes:
      - .:/opt/project
      - ~/.dbt:/home/airflow/.dbt
      - ./logs:/opt/airflow/logs
    command: >
      bash -c "
      airflow db migrate
      "

  airflow-api-server:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: retail_airflow_api_server
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__API__BASE_URL: http://airflow-api-server:8080
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: 8793
      AIRFLOW__LOGGING__TRIGGERER_LOG_SERVER_PORT: 8794
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      GOOGLE_APPLICATION_CREDENTIALS: /opt/project/credentials/gcp-service-account.json
    volumes:
      - .:/opt/project
      - ~/.dbt:/home/airflow/.dbt
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: airflow api-server
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: retail_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__API__BASE_URL: http://airflow-api-server:8080
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: 8793
      AIRFLOW__LOGGING__TRIGGERER_LOG_SERVER_PORT: 8794
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      GOOGLE_APPLICATION_CREDENTIALS: /opt/project/credentials/gcp-service-account.json
    volumes:
      - .:/opt/project
      - ~/.dbt:/home/airflow/.dbt
      - ./logs:/opt/airflow/logs
    command: airflow scheduler
    restart: unless-stopped

  airflow-triggerer:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: retail_airflow_triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__API__BASE_URL: http://airflow-api-server:8080
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
      AIRFLOW__LOGGING__TRIGGERER_LOG_SERVER_PORT: 8794
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      GOOGLE_APPLICATION_CREDENTIALS: /opt/project/credentials/gcp-service-account.json
    volumes:
      - .:/opt/project
      - ~/.dbt:/home/airflow/.dbt
      - ./logs:/opt/airflow/logs
    command: airflow triggerer
    restart: unless-stopped

  airflow-dag-processor:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: retail_airflow_dag_processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__API__BASE_URL: http://airflow-api-server:8080
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      GOOGLE_APPLICATION_CREDENTIALS: /opt/project/credentials/gcp-service-account.json
    volumes:
      - .:/opt/project
      - ~/.dbt:/home/airflow/.dbt
      - ./logs:/opt/airflow/logs
    command: airflow dag-processor
    restart: unless-stopped

volumes:
  airflow_postgres_data: