version: 2

models:
  - name: silver_customers
    description: One row per customer from Shopify bronze customer payloads.
    columns:
      - name: customer_id
        description: Shopify customer ID.
        tests:
          - not_null
          - unique

      - name: email
        description: Customer email address.

      - name: orders_count
        description: Number of orders associated with the customer.
        tests:
          - not_null

  - name: silver_customers_addresses
    description: One row per customer address from Shopify bronze customer payloads.
    columns:
      - name: address_id
        description: Shopify customer address ID.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Parent customer ID for the address.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_customers')
                field: customer_id

  - name: silver_products
    description: One row per Shopify product.
    columns:
      - name: product_id
        description: Shopify product ID.
        tests:
          - not_null
          - unique

      - name: product_title
        description: Product title from the Shopify payload.
        tests:
          - not_null

  - name: silver_products_variants
    description: One row per Shopify product variant.
    columns:
      - name: variant_id
        description: Shopify product variant ID.
        tests:
          - not_null
          - unique

      - name: product_id
        description: Parent Shopify product ID for the variant.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_products')
                field: product_id

      - name: variant_price
        description: Price of the product variant.
        tests:
          - not_null

  - name: silver_orders
    description: One row per Shopify order.
    columns:
      - name: order_id
        description: Shopify order ID.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Customer ID associated with the order.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_customers')
                field: customer_id

      - name: total_price
        description: Total order value.
        tests:
          - not_null

      - name: order_number
        description: Shopify order number.
        tests:
          - not_null

  - name: silver_order_line_items
    description: One row per Shopify order line item.
    columns:
      - name: line_item_id
        description: Shopify line item ID.
        tests:
          - not_null

      - name: order_id
        description: Parent Shopify order ID.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_orders')
                field: order_id

      - name: product_id
        description: Parent Shopify product ID on the line item.
        tests:
          - relationships:
              arguments:
                to: ref('silver_products')
                field: product_id

      - name: quantity
        description: Quantity purchased on the line item.
        tests:
          - not_null

      - name: unit_price
        description: Unit price of the line item.
        tests:
          - not_null

  - name: dim_customers
    description: Customer dimension table used for analytics joins.
    columns:
      - name: customer_id
        description: Business key for the customer dimension.
        tests:
          - not_null
          - unique

  - name: dim_products
    description: Product dimension table used for analytics joins.
    columns:
      - name: product_id
        description: Business key for the product dimension.
        tests:
          - not_null
          - unique

      - name: product_title
        description: Product title used for reporting and slicing.
        tests:
          - not_null

  - name: dim_product_variants
    description: Product variant dimension table used for analytics joins.
    columns:
      - name: variant_id
        description: Business key for the product variant dimension.
        tests:
          - not_null
          - unique

      - name: product_id
        description: Parent product business key for the variant.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

  - name: dim_date
    description: Calendar date dimension used for time-based reporting.
    columns:
      - name: date_day
        description: Calendar date key.
        tests:
          - not_null
          - unique

  - name: fact_order_line_items
    description: Central sales fact table with one row per sold order line item.
    columns:
      - name: line_item_id
        description: Business key for the sold line item.
        tests:
          - not_null

      - name: order_id
        description: Parent order business key.
        tests:
          - not_null

      - name: customer_id
        description: Customer business key associated with the sold line item.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: product_id
        description: Product business key associated with the sold line item.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: variant_id
        description: Product variant business key associated with the sold line item.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product_variants')
                field: variant_id

      - name: order_date
        description: Calendar date of the order.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day

      - name: quantity
        description: Quantity sold on the line item.
        tests:
          - not_null

      - name: unit_price
        description: Unit selling price on the line item.
        tests:
          - not_null

      - name: line_revenue
        description: Extended revenue for the line item calculated as quantity times unit price.
        tests:
          - not_null

  - name: gold_daily_sales
    description: Daily sales mart with one row per order date.
    columns:
      - name: order_date
        description: Calendar date of sales activity.
        tests:
          - not_null
          - unique

      - name: total_orders
        description: Total distinct orders placed on the date.
        tests:
          - not_null

      - name: total_units_sold
        description: Total quantity of units sold on the date.
        tests:
          - not_null

      - name: total_revenue
        description: Total revenue generated on the date.
        tests:
          - not_null

  - name: gold_product_sales
    description: Product performance mart with one row per product.
    columns:
      - name: product_id
        description: Product business key.
        tests:
          - not_null

      - name: product_title
        description: Product title.
        tests:
          - not_null

      - name: total_orders
        description: Number of distinct orders containing the product.
        tests:
          - not_null

      - name: total_units_sold
        description: Total units sold for the product.
        tests:
          - not_null

      - name: all_time_revenue
        description: Total lifetime revenue generated by the product.
        tests:
          - not_null

  - name: gold_customer_lifetime_value
    description: Customer value mart with one row per customer.
    columns:
      - name: customer_id
        description: Customer business key.
        tests:
          - not_null

      - name: customer_full_name
        description: Customer full name.
        tests:
          - not_null

      - name: total_orders
        description: Total number of distinct orders placed by the customer.
        tests:
          - not_null

      - name: total_units_purchased
        description: Total units purchased by the customer.
        tests:
          - not_null

      - name: lifetime_revenue
        description: Total revenue generated by the customer across all orders.
        tests:
          - not_null

      - name: average_order_value
        description: Average revenue per order for the customer.
        tests:
          - not_null

  - name: gold_order_basket_behavior
    description: Order-level mart for basket behavior analysis.
    columns:
      - name: order_id
        description: Order business key.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Customer business key associated with the order.
        tests:
          - not_null

      - name: order_date
        description: Calendar date of the order.
        tests:
          - not_null

      - name: line_item_count
        description: Number of line item rows in the order.
        tests:
          - not_null

      - name: total_units_in_order
        description: Total quantity of units in the order.
        tests:
          - not_null

      - name: order_revenue
        description: Total revenue generated by the order.
        tests:
          - not_null

      - name: is_fulfilled
        description: Boolean flag indicating whether the order was fulfilled.
        tests:
          - not_null