version: 2

models:
  - name: silver_customers
    description: One row per customer from Shopify bronze customer payloads.
    columns:
      - name: customer_id
        description: Shopify customer ID.
        tests:
          - not_null
          - unique

      - name: email
        description: Customer email address.

      - name: orders_count
        description: Number of orders for the customer.
        tests:
          - not_null

  - name: silver_customers_addresses
    description: One row per customer address from Shopify bronze customer payloads.
    columns:
      - name: address_id
        description: Shopify address ID.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Parent customer ID for the address.
        tests:
          - not_null
          - relationships:
              to: ref('silver_customers')
              field: customer_id

  - name: silver_products
    description: One row per Shopify product.
    columns:
      - name: product_id
        description: Shopify product ID.
        tests:
          - not_null
          - unique

      - name: product_title
        description: Product title from Shopify payload.
        tests:
          - not_null

  - name: silver_products_variants
    description: One row per Shopify product variant.
    columns:
      - name: variant_id
        description: Shopify product variant ID.
        tests:
          - not_null
          - unique

      - name: product_id
        description: Parent product ID for the variant.
        tests:
          - not_null
          - relationships:
              to: ref('silver_products')
              field: product_id

      - name: variant_price
        description: Variant price.
        tests:
          - not_null